<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dumpy Status • Backup</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        
        :root {
            --purple: #7C3AED;
            --purple-light: #A78BFA;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', system_ui, sans-serif;
            background: linear-gradient(135deg, #F8FAFC 0%, #F1E8FF 100%);
            color: #1E2937;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        
        .background {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 25% 35%, rgba(124, 58, 237, 0.15) 0%, transparent 55%),
                radial-gradient(circle at 75% 65%, rgba(167, 139, 250, 0.12) 0%, transparent 55%);
            animation: float 35s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(35px, 25px); }
        }
        
        .container {
            text-align: center;
            z-index: 10;
        }
        
        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.4rem;
            font-weight: 600;
            color: var(--purple);
            margin-bottom: 2.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        
        .status-card {
            background: white;
            border-radius: 32px;
            padding: 4.5rem 6rem;
            box-shadow: 0 25px 60px rgba(124, 58, 237, 0.15);
            border: 2px solid rgba(124, 58, 237, 0.2);
            max-width: 520px;
            width: 100%;
        }
        
        .live-dot {
            display: inline-block;
            width: 16px;
            height: 16px;
            background: #22C55E;
            border-radius: 50%;
            animation: live-pulse 2s infinite;
            margin-right: 14px;
        }
        
        @keyframes live-pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.35); }
        }
        
        .status {
            font-size: 5.2rem;
            font-weight: 700;
            color: #10B981;
            margin: 1rem 0 0.5rem;
            letter-spacing: -2px;
        }
        
        .subtitle {
            font-size: 1.5rem;
            color: #64748B;
            margin-bottom: 2rem;
        }
        
        .backup-notice {
            margin-top: 2rem;
            padding: 12px 24px;
            background: #F1F5F9;
            border-radius: 9999px;
            font-size: 1rem;
            color: #475569;
            display: inline-block;
        }
        
        footer {
            margin-top: 5rem;
            color: #94A3B8;
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <div class="background"></div>
    
    <div class="container">
        <div class="logo">
            Dumpy Status
            <span style="font-size:1.4rem; opacity:0.7;">●</span>
        </div>
        
        <div class="status-card">
            <div>
                <span class="live-dot"></span>
                <span style="font-size:1.25rem; font-weight:600; color:#10B981; letter-spacing:1px;">ALL SYSTEMS</span>
            </div>
            
            <div class="status">ONLINE</div>
            
            <div class="subtitle">
                Dumpy is fully operational
            </div>
            
            <div class="backup-notice">
                🔄 Backup Status Page • Real-time monitoring
            </div>
        </div>
    </div>
    
    <footer>
        © Dumpy Status • Always here as backup 💜
    </footer>

    <script>
        // Gentle live clock
        function updateClock() {
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            console.log(`%c🟢 Dumpy Backup Status - ${time}`, 'color:#10B981; font-weight:500');
        }
        
        updateClock();
        setInterval(updateClock, 30000);
    </script>
</body>
</html>
